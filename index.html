<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>Claude Code Viewer</title>
  <link rel="icon" href="/favicon.ico?v=1">
  <link rel="shortcut icon" href="/favicon.ico?v=1">
  <script>
    // 在 React 渲染前同步抢占 data-theme，避免明暗主题闪屏。
    // 优先级：URL ?theme= > localStorage 缓存 > <html data-theme> 默认 (light/雪山白)。
    // URL 优先是为了让分享链接（?theme=dark）首屏就生效，不被 localStorage 抢一拍。
    try {
      const url = new URLSearchParams(location.search).get('theme');
      const cached = localStorage.getItem('ccv_themeColor');
      const pick = (url === 'dark' || url === 'light') ? url
                 : (cached === 'dark' || cached === 'light') ? cached
                 : null;
      if (pick) document.documentElement.setAttribute('data-theme', pick);
    } catch {}
    // 整体显示大小：React 渲染前同步抢占 zoom，避免首屏以 100% 渲染后再跳变。
    // localStorage 仅作首屏镜像；真相源是 preferences.json，hydrate 时会以服务端值覆盖。
    try {
      const n = Number(localStorage.getItem('ccv_displayScale'));
      if (Number.isFinite(n) && n >= 50 && n <= 200 && n !== 100) {
        document.documentElement.style.zoom = String(n / 100);
      }
    } catch {}
  </script>
</head>
<body>
  <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#888;font-family:system-ui">Loading...</div></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
